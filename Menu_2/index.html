<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <header></header>

    <main>



        <form action=""> <!-- Es la etiqueta para formularios  -->


            <fieldset>
                <!-- Sirve para separar por secciones, como: información personal, datos de tarjeta, informacion de acompañante -->

                <legend>Informacion de Pago</legend> <!-- Acá va el título de la sección -->


                <label for="nombre">Nombre</label> <!-- Este es el nombre de la sección del formulario -->
                <input type="text" id="nombre" placeholder="Alejandro Forero">  <!-- Este es el tipo de formulario, el ID al que se ancla la información y el texto de ejemplo -->

                <label for="email">Email</label>
                <input type="email" id="email" placeholder="ejempo@ejemplo.com">

                <label for="pasword">Contraseña</label>
                <input type="pasword" id="pasword" placeholder="********">

                <!--  -->
            </fieldset>

            <button>Enviar</button>



        </form>




    </main>

    <footer></footer>

</body>

</html>
